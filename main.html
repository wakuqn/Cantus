<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantus test mode</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>

    <div class="container">
        <h1>Cantus</h1>
        <p>This is a test mode for Cantus, a music composition software.</p>
    </div>
    <div class="button-container">
        <a href="/playlist/test_playLiSt.html" class="my-button">Play</a>
    </div>

    <div class="container">
        <!-- プレイリスト作成エリア -->
        <div style="margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px;">
            <h3>Create New Playlist</h3>
            <input type="text" id="new-playlist-name" placeholder="Playlist Name">
            <button onclick="createPlaylist()">Create</button>
        </div>

        <!-- プレイリスト選択 -->
        <h3>Select Playlist</h3>
        <select id="playlist-select" onchange="loadFiles()">
            <option value="all">All Songs</option>
            <!-- ここにプレイリストが追加されます -->
        </select>

        <h2 id="list-title">All Songs</h2>
        <ul id="file-list">
            <!-- データベースから読み込んだファイル名がここに表示されます -->
        </ul>
    </div>

    <script>
        let currentPlaylistId = 'all';
        let availablePlaylists = [];

        // ページの読み込みが完了したら実行
        document.addEventListener('DOMContentLoaded', function () {
            loadPlaylists();
            loadFiles();
        });

        function loadPlaylists() {
            fetch('/api/get_playlists')
                .then(response => response.json())
                .then(playlists => {
                    availablePlaylists = playlists;
                    const select = document.getElementById('playlist-select');
                    // 既存のオプション（All Songs以外）をクリア
                    while (select.options.length > 1) {
                        select.remove(1);
                    }
                    playlists.forEach(pl => {
                        const option = document.createElement('option');
                        option.value = pl.id;
                        option.textContent = pl.name;
                        select.appendChild(option);
                    });
                });
        }

        function loadFiles() {
            const select = document.getElementById('playlist-select');
            currentPlaylistId = select.value;
            const listTitle = document.getElementById('list-title');
            listTitle.textContent = select.options[select.selectedIndex].text;

            let url = '/api/playlists'; // デフォルトは全曲
            if (currentPlaylistId !== 'all') {
                url = `/api/get_playlist_songs?id=${currentPlaylistId}`;
            }

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const fileList = document.getElementById('file-list');
                    fileList.innerHTML = ''; // リストをクリア

                    data.forEach(filename => {
                        const li = document.createElement('li');

                        // 曲名リンク
                        const a = document.createElement('a');
                        a.textContent = filename;
                        a.href = `/playlist/test_playLiSt.html?file=${encodeURIComponent(filename)}`;
                        li.appendChild(a);

                        // プレイリストへの追加ボタン（All Songs表示時のみ）
                        if (currentPlaylistId === 'all') {
                            const addBtn = document.createElement('button');
                            addBtn.textContent = '+';
                            addBtn.style.marginLeft = '10px';
                            addBtn.onclick = () => addToPlaylistPrompt(filename);
                            li.appendChild(addBtn);
                        }

                        fileList.appendChild(li);
                    });
                })
                .catch(error => console.error('Error fetching files:', error));
        }

        function createPlaylist() {
            const nameInput = document.getElementById('new-playlist-name');
            const name = nameInput.value;
            if (!name) return;

            fetch('/api/create_playlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            })
                .then(res => res.json())
                .then(data => {
                    // 作成成功したら、そのプレイリスト画面(プレイヤー画面)へ移動
                    window.location.href = `/playlist/test_playLiSt.html?playlist_id=${data.id}&playlist_name=${encodeURIComponent(data.name)}`;
                });
        }

        function addToPlaylistPrompt(filename) {
            if (availablePlaylists.length === 0) {
                alert("No playlists available. Create one first.");
                return;
            }

            let msg = "Enter Playlist ID to add to:\n";
            availablePlaylists.forEach(pl => msg += `${pl.id}: ${pl.name}\n`);

            const playlistId = prompt(msg);
            if (playlistId) {
                fetch('/api/add_to_playlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ playlist_id: playlistId, filename: filename })
                })
                    .then(res => res.json())
                    .then(() => alert('Added to playlist!'));
            }
        }
    </script>
</body>

</html>
