<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantus Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Login to Cantus</h1>
        <div class="button-container" style="flex-direction: column; gap: 10px;">
            <!-- GitHub Login -->
            <a href="/api/auth/github" class="my-button"
                style="background-color: #333; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <img src="image/github_logo_icon_229278.png" alt="GitHub Logo"
                    style="width: 20px; height: 20px; object-fit: contain;">
                Login with GitHub
            </a>

            <!-- Google Login -->
            <a href="/api/auth/google" class="my-button"
                style="background-color: #ffffff; color: rgb(0, 0, 0); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 13px; padding: 19px; margin-bottom: 12px; border: 1px solid #333333;">
                <img src="image/google_icon.png" alt="Google Logo"
                    style="width: 20px; height: 20px; object-fit: contain;">
                Login with Google
            </a>
        </div>
        <p style="margin-top: 20px;">
            <a href="/main.html">Skip Login (Guest Mode)</a>
        </p>
    </div>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
    <style>
        .bottom-right-text {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 14px;
            color: #3b3b3b;
        }
    </style>
    <div class="bottom-right-text">
        <h7>Experimental 　　v0.12.4 ©2026 Cantus
        </h7>
    </div>
</body>
