<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantus Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', 'Segoe UI', Meiryo, -apple-system, sans-serif;
            background: #0f0f0f;
            /* base dark */
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated background blob */
        .bg-blob {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.15) 0%, rgba(255, 0, 80, 0.15) 50%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-30%, -40%);
            z-index: 0;
            animation: pulse 12s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: translate(-30%, -40%) scale(1);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -60%) scale(1.1);
                opacity: 1;
            }
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
        }

        .player-wrapper {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: #aaaaaa;
            text-decoration: none;
            font-size: 28px;
            line-height: 1;
            transition: color 0.3s, background 0.3s;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }

        .back-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.15);
        }

        .now-playing-text {
            font-size: 12px;
            font-weight: 600;
            color: #aaaaaa;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .spacer {
            width: 36px;
        }

        .artwork-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            background: linear-gradient(135deg, #1f1f1f 0%, #2a2a2a 100%);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 融合アートワーク */
        .artwork {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(135deg, #ff0050 0%, #1db954 100%);
            /* YouTube x Spotify Colors */
            opacity: 0.9;
            border-radius: 20px;
        }

        .music-icon {
            font-size: 110px;
            color: white;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .track-info {
            text-align: center;
        }

        .track-title {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .track-artist {
            margin: 6px 0 0;
            font-size: 15px;
            color: #b3b3b3;
            font-weight: 400;
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #aaaaaa;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }

        .seek-bar {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: height 0.2s;
        }

        .seek-bar:hover {
            height: 6px;
        }

        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .seek-bar:hover::-webkit-slider-thumb {
            width: 14px;
            height: 14px;
            margin-top: -4px;
        }

        /* Controls */
        .controls-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, color 0.2s, opacity 0.2s;
            outline: none;
        }

        .control-btn:hover {
            opacity: 0.8;
            transform: scale(1.1);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .btn-side {
            font-size: 18px;
            color: #aaaaaa;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
        }

        .btn-side:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            font-size: 28px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
        }

        .btn-play {
            width: 72px;
            height: 72px;
            background: #ffffff;
            color: #000000;
            border-radius: 50%;
            font-size: 16px;
            /* JSが"再生"等を注入してもはみ出さない */
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
        }

        .btn-play:hover {
            transform: scale(1.05);
            background: #f0f0f0;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
            opacity: 1;
        }

        /* Bottom Row */
        .bottom-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #aaaaaa;
            font-size: 14px;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 90px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            transition: height 0.2s;
        }

        .volume-slider:hover {
            height: 6px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .btn-stop {
            font-size: 14px;
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }

        .btn-stop:hover {
            background: rgba(255, 77, 77, 0.2);
            opacity: 1;
        }

        /* Queue List */
        .queue-container {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .queue-container h4 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #ffffff;
            font-weight: 600;
        }

        #playlistSongs {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }

        #playlistSongs::-webkit-scrollbar {
            width: 6px;
        }

        #playlistSongs::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        #playlistSongs li {
            padding: 12px 16px;
            margin-bottom: 6px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            display: flex;
            align-items: center;
        }

        #playlistSongs li:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }

        #playlistSongs li a {
            color: inherit;
            text-decoration: none;
            display: block;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>
    <div class="bg-blob"></div>

    <div class="app-container">
        <!-- プレイヤーエリア -->
        <div class="player-wrapper">
            <!-- ヘッダー -->
            <div class="player-header">
                <a href="/main.html" class="back-btn" title="戻る">‹</a>
                <span class="now-playing-text">Now Playing</span>
                <div class="spacer"></div>
            </div>

            <!-- アートワーク -->
            <div class="artwork-container">
                <div class="artwork">
                    <div class="music-icon">🎵</div>
                </div>
            </div>

            <!-- トラック情報 -->
            <div class="track-info">
                <h2 id="playerTitle" class="track-title">Loading...</h2>
                <audio id="myAudio"></audio>
                <p class="track-artist">Cantus Music</p>
            </div>

            <!-- シークバー (Progress) -->
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <input type="range" id="seekBar" class="seek-bar" value="0" step="1">
                <span id="duration">0:00</span>
            </div>

            <!-- コントロールボタン -->
            <div class="controls-container">
                <button class="control-btn btn-side" onclick="skip(-10)" title="10秒戻る">↺</button>
                <button class="control-btn btn-primary" onclick="prevTrack()" title="前の曲">⏮</button>
                <button class="control-btn btn-play" onclick="togglePlay()" id="playBtn">▶</button>
                <button class="control-btn btn-primary" onclick="nextTrack()" title="次の曲">⏭</button>
                <button class="control-btn btn-side" onclick="skip(10)" title="10秒進む">↻</button>
            </div>

            <!-- ボリュームと停止 -->
            <div class="bottom-controls">
                <div class="volume-control">
                    <span style="font-size: 18px;">🔈</span>
                    <input type="range" id="volumeBar" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
                    <span id="volumeText"
                        style="min-width: 40px; text-align: right; font-variant-numeric: tabular-nums;">50%</span>
                </div>
                <button class="control-btn btn-stop" onclick="stopAudio()">⏹ 停止</button>
            </div>
        </div>

        <!-- プレイリストキュー -->
        <div class="queue-container" id="playlistContainer" style="display: none;">
            <h4 id="queueTitle">次の曲 (Queue)</h4>
            <ul id="playlistSongs">
            </ul>
        </div>
    </div>

    <!-- 外部スクリプトの読み込み -->
    <script src="playlist.js"></script>
    <script src="volume.js"></script>

</body>

</html>
