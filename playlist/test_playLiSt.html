<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Cantus player1</title>
    <style>
        .player-container {
            font-family: sans-serif;
            background: #f4f4f4;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .controls {
            margin-top: 15px;
        }

        button {
            padding: 10px;
            cursor: pointer;
            margin: 0 5px;
        }

        .seek-bar {
            width: 100%;
            margin-top: 15px;
        }

        .volume-control {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .volume-slider {
            width: 100px;
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="player-container" style="margin-top: 20px;">
        <h3 id="playerTitle">audio id</h3>
        <!-- 音声ファイルのパスはここで指定 -->
        <audio id="myAudio" src="/music/Blue_Star.mp3"></audio>

        <div>
            <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
        </div>

        <input type="range" id="seekBar" class="seek-bar" value="0" step="1">

        <div class="controls">
            <button onclick="skip(-10)">-10s</button>
            <button onclick="togglePlay()" id="playBtn">再生</button>
            <button onclick="stopAudio()">停止</button>
            <button onclick="skip(10)">+10s</button>
        </div>

        <!-- ボリュームコントロール -->
        <div class="volume-control">
            <label for="volumeBar" style="font-size: 0.9em;">音量:</label>
            <input type="range" id="volumeBar" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <span id="volumeText" style="font-size: 0.9em; min-width: 40px;">50%</span>
        </div>
    </div>

    <!-- 外部スクリプトの読み込み -->
    <script src="playlist.js"></script>
    <script src="volume.js"></script>

    <!-- ここに戻るボタンを追加 -->
    <div class="button-container" style="margin-top: 15px;">
        <a href="/main.html" class="my-button"
            style="text-decoration: none; background: #007bff; color: #fff; padding: 10px 15px; border-radius: 5px; display: inline-block;">Back
            to Main</a>
    </div>

    <!-- テストプレイリスト -->
    <div class="button-container" style="margin-top: 15px;">
        <a href="/playlist/hide_playlist.html" class="my-button"
            style="text-decoration: none; background: #007bff; color: #fff; padding: 10px 15px; border-radius: 5px; display: inline-block;">Move
            to ??</a>
        <h7>テストプレイリストへ</h7>

    </div>

    <!-- プレイリスト曲一覧エリア -->
    <div class="player-container" id="playlistContainer" style="margin-top: 20px; display: none;">
        <h4 id="queueTitle">Queue</h4>
        <ul id="playlistSongs" style="list-style: none; padding: 0; text-align: left;">
        </ul>
    </div>

    <!-- アップロードフォーム -->
    <div class="player-container" style="margin-top: 20px; margin-bottom: 30px;">
        <h4>Upload New Track</h4>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept=".mp3" required multiple>
            <div style="margin-top: 10px;">
                <button type="submit"
                    style="background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">Upload</button>
            </div>
        </form>
    </div>
    <div>
        <script src="calc.js"> </script>
        <button onclick="showPlaylistID()">表示</button>
        <h7 id="playlistID"></h7>
    </div>
</body>

</html>
